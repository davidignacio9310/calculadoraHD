<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="theme-color" content="#0e1a2e">
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --accent-color: #48cae4;
            --accent-hover: #00b4d8;
            --text-primary: #ffffff;
            --text-secondary: #90e0ef;
            --border-color: #3a506b;
            --success-color: #06d6a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: env(safe-area-inset-top, 10px);
        }

        .logo-container {
            background: rgba(72, 202, 228, 0.1);
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            padding: 10px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 12px rgba(72, 202, 228, 0.3);
        }

        .logo-container svg {
            width: 45px;
            height: 45px;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 1.3rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        p.subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        main {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #0b132b;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        /* Toggle Button Container */
        .toggle-container {
            display: flex;
            background: #0b132b;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 12px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .toggle-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 2px 8px rgba(72, 202, 228, 0.3);
        }

        /* Search input inside select container */
        .search-container {
            position: relative;
        }

        .search-container input {
            padding-right: 35px;
        }

        .search-container svg {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
            pointer-events: none;
        }

        .dialyzer-results {
            background: #0b132b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 5px;
            display: none;
            z-index: 10;
        }

        .dialyzer-option {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(58, 80, 107, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .dialyzer-option:active, .dialyzer-option.selected {
            background: rgba(72, 202, 228, 0.2);
            color: var(--accent-color);
        }

        .dialyzer-clearance {
            font-size: 0.75rem;
            background: rgba(6, 214, 160, 0.15);
            color: var(--success-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-calc {
            width: 100%;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(72, 202, 228, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn-calc:active {
            background: var(--accent-hover);
        }

        /* Results Card */
        .results-container {
            display: none;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-highlight {
            background: linear-gradient(135deg, rgba(72, 202, 228, 0.15) 0%, rgba(6, 214, 160, 0.08) 100%);
            border: 1px solid var(--accent-color);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 12px;
        }

        .result-time {
            font-size: 2rem;
            font-weight: 800;
            color: var(--success-color);
            text-shadow: 0 0 8px rgba(6, 214, 160, 0.25);
            margin: 4px 0;
        }

        .result-time-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: rgba(11, 19, 43, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 2px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b132b;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        /* Info Badge style */
        .info-badge {
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 10px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: center;
            border-left: 3px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Icono de Nefrología (Riñones) -->
            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <g>
                    <!-- Riñón izquierdo estilizado -->
                    <path d="M190.2,143.5c-42.3,1.3-80.4,28.6-96.6,68.9c-23.7,59-5,127.4,43.2,160.8c30.2,20.9,64.2,24.1,96.6,12.5c17.2-6.2,30.2-18.7,40-34.3c5-8,8.2-17.1,9.8-26.6c1.1-6.6-3.4-12.7-10.1-13.8c-6.6-1.1-12.7,3.4-13.8,10.1c-1.2,7.2-3.6,14.1-7.4,20.2c-7.3,11.7-16.7,20.9-29.6,25.5c-24.8,8.9-50.5,6.2-73.4-9.6c-32.9-22.8-49.2-69.7-33-110.1c12.4-30.9,41.7-51.8,74.2-52.8c6.7-0.2,12-5.8,11.8-12.5C201.7,148.8,196.4,143.5,190.2,143.5z"/>
                    <!-- Riñón derecho estilizado -->
                    <path d="M321.8,143.5c-6.2,0-11.5,5.3-11.7,11.5c-0.2,6.7,5.1,12.3,11.8,12.5c32.5,1,61.8,21.9,74.2,52.8c16.2,40.4-0.1,87.3-33,110.1c-22.9,15.8-48.6,18.5-73.4,9.6c-12.9-4.6-22.3-13.8-29.6-25.5c-3.8-6.1-6.2-13-7.4-20.2c-1.1-6.6-7.2-11.2-13.8-10.1c-6.6,1.1-11.2,7.2-10.1,13.8c1.6,9.5,4.8,18.6,9.8,26.6c9.8,15.6,22.8,28.1,40,34.3c32.4,11.6,66.4,8.4,96.6-12.5c48.2-33.4,66.9-101.8,43.2-160.8C402.2,172.1,364.1,144.8,321.8,143.5z"/>
                    <!-- Vías urinarias centrales -->
                    <path d="M256,220c-8.8,0-16,7.2-16,16v120c0,26.5-21.5,48-48,48c-8.8,0-16,7.2-16,16s7.2,16,16,16c44.1,0,80-35.9,80-80V236C272,227.2,264.8,220,256,220z"/>
                    <path d="M272,416c0-26.5-21.5-48-48-48c-8.8,0-16,7.2-16,16s7.2,16,16,16c8.8,0,16,7.2,16,16v20c0,8.8,7.2,16,16,16s16-7.2,16-16V416z"/>
                </g>
            </svg>
        </div>
        <h1>Calculadora de Diálisis</h1>
        <p class="subtitle">Fórmula Watson - Optimizada para Móvil</p>
    </header>

    <main>
        <!-- Card Parámetros del Paciente -->
        <div class="card">
            <div class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Datos del Paciente
            </div>

            <!-- Selector de Fórmula con / sin Talla -->
            <div class="toggle-container">
                <button type="button" class="toggle-btn active" id="btn-con-talla" onclick="setFormula(true)">Con Talla</button>
                <button type="button" class="toggle-btn" id="btn-sin-talla" onclick="setFormula(false)">Sin Talla</button>
            </div>

            <div class="form-group">
                <label>Género</label>
                <div class="toggle-container" style="margin-bottom: 0;">
                    <button type="button" class="toggle-btn active" id="btn-masc" onclick="setGender('M')">Masculino</button>
                    <button type="button" class="toggle-btn" id="btn-fem" onclick="setGender('F')">Femenino</button>
                </div>
            </div>

            <div class="input-row" style="margin-top: 12px;">
                <div class="form-group">
                    <label for="input-peso">Peso (kg)</label>
                    <input type="number" id="input-peso" placeholder="ej. 70" step="0.1" inputmode="decimal" oninput="calculateOnTheFly()">
                </div>
                <div class="form-group" id="group-edad">
                    <label for="input-edad">Edad (años)</label>
                    <input type="number" id="input-edad" placeholder="ej. 55" inputmode="numeric" oninput="calculateOnTheFly()">
                </div>
            </div>

            <div class="form-group" id="group-talla">
                <label for="input-talla">Talla / Estatura (cm)</label>
                <input type="number" id="input-talla" placeholder="ej. 170" inputmode="numeric" oninput="calculateOnTheFly()">
            </div>
        </div>

        <!-- Card Parámetros de Prescripción y Dializador -->
        <div class="card">
            <div class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                Parámetros de Diálisis
            </div>

            <div class="form-group">
                <label for="input-ktv">Meta Kt/V Deseada</label>
                <input type="number" id="input-ktv" value="1.4" step="0.1" min="1.0" max="2.0" inputmode="decimal" oninput="calculateOnTheFly()">
            </div>

            <div class="form-group" style="position: relative;">
                <label for="dialyzer-search">Modelo del Dializador (Qb 300 ml/min)</label>
                <div class="search-container">
                    <input type="text" id="dialyzer-search" placeholder="Buscar dializador..." onfocus="showDialyzers()" oninput="filterDialyzers()">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
                <div class="dialyzer-results" id="dialyzer-list">
                    <!-- Se llena con Javascript -->
                </div>
            </div>

            <div class="form-group">
                <label for="input-clearance">Aclaramiento K Manual (ml/min)</label>
                <input type="number" id="input-clearance" placeholder="Ingresar valor K manual" inputmode="numeric" oninput="clearDialyzerSelection(); calculateOnTheFly();">
            </div>

            <button type="button" class="btn-calc" onclick="calculateTime()">Calcular Tiempo</button>
        </div>

        <!-- Resultados -->
        <div class="results-container" id="results-card">
            <div class="card">
                <div class="card-title" style="color: var(--success-color);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Resultado del Cálculo
                </div>

                <div class="result-highlight">
                    <div style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Tiempo Recomendado</div>
                    <div class="result-time" id="result-text-time">-- : --</div>
                    <div class="result-time-sub" id="result-text-minutes">0 minutos totales</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Volumen Corp. (V)</div>
                        <div class="stat-val" id="result-v">0.0 L</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Aclaramiento (K)</div>
                        <div class="stat-val" id="result-k">0 ml/min</div>
                    </div>
                </div>

                <div class="info-badge" id="formula-used-badge">
                    Fórmula utilizada: Watson (Con Talla)
                </div>
            </div>
        </div>
    </main>

    <script>
        // Base de Datos de Dializadores EXACTA de Dializador.docx
        const dialyzers = [
            { name: "F5", K: 227 },
            { name: "F6", K: 243 },
            { name: "F7", K: 247 },
            { name: "F8", K: 252 },
            { name: "F10", K: 259 },
            { name: "FX5", K: 228 },
            { name: "FX8", K: 254 },
            { name: "FX10", K: 261 },
            { name: "FX50", K: 253 },
            { name: "FX60", K: 266 },
            { name: "FX80", K: 279 },
            { name: "FX100", K: 280 },
            { name: "FX CorAL 60", K: 270 },
            { name: "FX CorAL 80", K: 277 },
            { name: "FX CorAL 100", K: 339 },
            { name: "FX CorAL 120", K: 345 },
            { name: "SM120", K: 255 },
            { name: "SM140", K: 260 },
            { name: "SM160", K: 267 },
            { name: "SM180", K: 275 },
            { name: "SM200", K: 280 },
            { name: "SM140", K: 229 },
            { name: "SM160", K: 231 },
            { name: "SM180", K: 235 },
            { name: "SM200", K: 238 },
            { name: "ELISIO ", K: 243 },
            { name: "ELISIO09H", K: 253 },
            { name: "ELISIO11H", K: 263 },
            { name: "ELISIO13H", K: 270 },
            { name: "ELISIO15H", K: 275 },
            { name: "ELISIO17H", K: 280 },
            { name: "ELISIO19H", K: 284 },
            { name: "ELISIO21H", K: 293 },
            { name: "ELISIO11M", K: 240 },
            { name: "ELISIO13M", K: 249 },
            { name: "ELISIO15M", K: 257 },
            { name: "ELISIO17M", K: 265 },
            { name: "ELISIO19M", K: 268 },
            { name: "ELISIO21M", K: 274 },
            { name: "ELISIO11L", K: 237 },
            { name: "ELISIO13L", K: 248 },
            { name: "ELISIO15L", K: 255 },
            { name: "ELISIO17L", K: 263 },
            { name: "ELISIO19L", K: 267 },
            { name: "ELISIO21L", K: 274 },
            { name: "Optiflux F160NRe", K: 271 },
            { name: "Optiflux F180NRe", K: 277 },
            { name: "Optiflux F200NRe", K: 280 },
            { name: "Optiflux F250NRe", K: 287 },
            { name: "Revaclear® 300", K: 272 },
            { name: "Revaclear® 400", K: 281 },
            { name: "POLYFLUX 140H", K: 262 },
            { name: "POLYFLUX 170H", K: 270 },
            { name: "POLYFLUX 210H", K: 281 },
            { name: "Theranova 400", K: 246 },
            { name: "Theranova 500", K: 250 }
        ];

        // Estado de la App
        let state = {
            conTalla: true,
            genero: 'M',
            selectedDialyzer: null
        };

        // Al iniciar la App
        window.addEventListener('DOMContentLoaded', () => {
            initDialyzers();
            // Cerrar lista de dializadores si se hace clic afuera
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container') && !e.target.closest('.dialyzer-results')) {
                    document.getElementById('dialyzer-list').style.display = 'none';
                }
            });
        });

        function setFormula(useTalla) {
            state.conTalla = useTalla;
            
            const btnCon = document.getElementById('btn-con-talla');
            const btnSin = document.getElementById('btn-sin-talla');
            const groupTalla = document.getElementById('group-talla');
            const groupEdad = document.getElementById('group-edad');

            if (useTalla) {
                btnCon.classList.add('active');
                btnSin.classList.remove('active');
                groupTalla.style.display = 'flex';
                groupEdad.style.display = 'flex';
            } else {
                btnCon.classList.remove('active');
                btnSin.classList.add('active');
                groupTalla.style.display = 'none';
                groupEdad.style.display = 'none';
            }
            calculateOnTheFly();
        }

        function setGender(gen) {
            state.genero = gen;
            const btnMasc = document.getElementById('btn-masc');
            const btnFem = document.getElementById('btn-fem');

            if (gen === 'M') {
                btnMasc.classList.add('active');
                btnFem.classList.remove('active');
            } else {
                btnMasc.classList.remove('active');
                btnFem.classList.add('active');
            }
            calculateOnTheFly();
        }

        function initDialyzers() {
            const listDiv = document.getElementById('dialyzer-list');
            listDiv.innerHTML = '';
            
            dialyzers.forEach((dialyzer, index) => {
                const opt = document.createElement('div');
                opt.className = 'dialyzer-option';
                opt.innerHTML = `
                    <span>${dialyzer.name.trim()}</span>
                    <span class="dialyzer-clearance">K: ${dialyzer.K} ml/min</span>
                `;
                opt.onclick = () => selectDialyzer(dialyzer);
                listDiv.appendChild(opt);
            });
        }

        function showDialyzers() {
            document.getElementById('dialyzer-list').style.display = 'block';
        }

        function filterDialyzers() {
            const query = document.getElementById('dialyzer-search').value.toLowerCase().trim();
            const options = document.querySelectorAll('.dialyzer-option');
            let visibleCount = 0;

            options.forEach(opt => {
                const text = opt.innerText.toLowerCase();
                if (text.includes(query)) {
                    opt.style.display = 'flex';
                    visibleCount++;
                } else {
                    opt.style.display = 'none';
                }
            });

            document.getElementById('dialyzer-list').style.display = visibleCount > 0 ? 'block' : 'none';
        }

        function selectDialyzer(dialyzer) {
            state.selectedDialyzer = dialyzer;
            document.getElementById('dialyzer-search').value = dialyzer.name.trim();
            document.getElementById('input-clearance').value = dialyzer.K;
            document.getElementById('dialyzer-list').style.display = 'none';
            calculateOnTheFly();
        }

        function clearDialyzerSelection() {
            state.selectedDialyzer = null;
            document.getElementById('dialyzer-search').value = '';
        }

        // Calcula dinámicamente si los datos ingresados son válidos
        function calculateOnTheFly() {
            const peso = parseFloat(document.getElementById('input-peso').value);
            const clearance = parseFloat(document.getElementById('input-clearance').value);
            
            if (!isNaN(peso) && !isNaN(clearance)) {
                calculateTime();
            }
        }

        function calculateTime() {
            const peso = parseFloat(document.getElementById('input-peso').value);
            const edad = parseFloat(document.getElementById('input-edad').value);
            const talla = parseFloat(document.getElementById('input-talla').value);
            const ktvMeta = parseFloat(document.getElementById('input-ktv').value);
            const K = parseFloat(document.getElementById('input-clearance').value);

            // Validaciones
            if (isNaN(peso) || peso <= 0) return;
            if (isNaN(K) || K <= 0) return;
            if (isNaN(ktvMeta) || ktvMeta <= 0) return;

            let V = 0; // Volumen en Litros

            if (state.conTalla) {
                if (isNaN(edad) || edad <= 0 || isNaN(talla) || talla <= 0) return;
                
                // Fórmula de Watson Con Talla
                if (state.genero === 'M') {
                    V = 2.447 - (0.09516 * edad) + (0.1074 * talla) + (0.3362 * peso);
                } else {
                    V = -2.097 + (0.1069 * talla) + (0.2466 * peso);
                }
            } else {
                // Fórmula de Watson Sin Talla (Constantes: Mujer 0.58, Hombre 0.60)
                if (state.genero === 'M') {
                    V = 0.60 * peso;
                } else {
                    V = 0.58 * peso;
                }
            }

            // Cálculo de tiempo t en minutos: t = (Kt/V * V) / K
            const V_ml = V * 1000;
            const t_minutos = (ktvMeta * V_ml) / K;

            // Formatear Tiempo a Horas y Minutos
            const horas = Math.floor(t_minutos / 60);
            const minutosRestantes = Math.round(t_minutos % 60);

            // Actualizar interfaz
            document.getElementById('result-v').innerText = `${V.toFixed(2)} L`;
            document.getElementById('result-k').innerText = `${K.toFixed(0)} ml/min`;
            
            const txtHoras = horas.toString().padStart(2, '0');
            const txtMinutos = minutosRestantes.toString().padStart(2, '0');
            document.getElementById('result-text-time').innerText = `${txtHoras}:${txtMinutos} hrs`;
            document.getElementById('result-text-minutes').innerText = `${Math.round(t_minutos)} minutos en total`;
            
            document.getElementById('formula-used-badge').innerText = `Fórmula utilizada: Watson (${state.conTalla ? 'Con Talla' : 'Sin Talla'}) - ${state.genero === 'M' ? 'Hombre' : 'Mujer'}`;

            // Mostrar resultados
            document.getElementById('results-card').style.display = 'block';
        }
    </script>

    <!-- Script de Service Worker para funcionamiento 100% Offline PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'nephro-dialysis-v2';
                    const ASSETS = [
                        './',
                        './index.html'
                    ];

                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(ASSETS))
                            .then(() => self.skipWaiting())
                        );
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(keys => {
                                return Promise.all(
                                    keys.map(key => {
                                        if (key !== CACHE_NAME) {
                                            return caches.delete(key);
                                        }
                                    })
                                );
                            }).then(() => self.clients.claim())
                        );
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request)
                            .then(cachedResponse => {
                                if (cachedResponse) {
                                    return cachedResponse;
                                }
                                return fetch(event.request);
                            })
                        );
                    });
                `;

                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('PWA Service Worker listo y activo de forma offline.'))
                    .catch(err => console.log('Error de Service Worker:', err));
            });
        }
    </script>
