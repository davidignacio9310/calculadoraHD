<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Calculadora de Tiempo de Diálisis</title>
    
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --accent-color: #48cae4;
            --text-color: #ffffff;
            --text-dim: #9aa5b1;
            --success-color: #06d6a0;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        header svg {
            width: 40px;
            height: 40px;
            fill: var(--accent-color);
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .card-section {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-group {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 15px;
        }

        .toggle-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-wrapper.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        input, select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .search-container {
            position: relative;
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #151c33;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 180px;
            overflow-y: auto;
            z-index: 10;
            border-radius: 8px;
            margin-top: 5px;
            display: none;
        }

        .dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dropdown-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-calc {
            width: 100%;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .result-card {
            background: rgba(6, 214, 160, 0.05);
            border: 1px solid var(--success-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .result-time {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success-color);
            margin: 10px 0;
        }

        .result-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <svg viewBox="0 0 512 512">
                <path d="M368,64H144c-26.5,0-48,21.5-48,48v288c0,26.5,21.5,48,48,48h224c26.5,0,48-21.5,48-48V112C416,85.5,394.5,64,368,64z M384,400c0,8.8-7.2,16-16,16H144c-8.8,0-16-7.2-16-16V112c0-8.8,7.2-16,16-16h224c8.8,0,16,7.2,16,16V400z"/>
                <path d="M200,144h112c8.8,0,16-7.2,16-16s-7.2-16-16-16H200c-8.8,0-16,7.2-16,16S191.2,144,200,144z"/>
                <path d="M256,200c-44.1,0-80,35.9-80,80s35.9,80,80,80s80-35.9,80-80S300.1,200,256,200z M256,328c-26.5,0-48-21.5-48,48s21.5-48,48-48s48,21.5,48,48S282.5,328,256,328z"/>
            </svg>
            <div>
                <h1>Tiempo de HD</h1>
                <p>Prescripción de Diálisis Fisiológica (Watson)</p>
            </div>
        </header>

        <div class="card-section">
            <div class="section-title">👤 Datos del Paciente</div>
            <div class="toggle-group">
                <button type="button" class="toggle-btn active" id="btn-watson" onclick="setFormula('watson')">Con Talla (Watson)</button>
                <button type="button" class="toggle-btn" id="btn-simp" onclick="setFormula('simplificada')">Sin Talla (Simplificado)</button>
            </div>

            <div class="toggle-group">
                <button type="button" class="toggle-btn active" id="btn-m" onclick="setGender('M')">Masculino</button>
                <button type="button" class="toggle-btn" id="btn-f" onclick="setGender('F')">Femenino</button>
            </div>

            <div class="grid-inputs">
                <div class="input-wrapper">
                    <label for="input-peso">Peso (kg)</label>
                    <input type="number" id="input-peso" step="0.1" inputmode="decimal" placeholder="Ej. 70">
                </div>
                <div class="input-wrapper">
                    <label for="input-edad">Edad (años)</label>
                    <input type="number" id="input-edad" inputmode="numeric" placeholder="Ej. 60">
                </div>
                <div class="input-wrapper full-width" id="wrapper-talla">
                    <label for="input-talla">Talla (cm)</label>
                    <input type="number" id="input-talla" inputmode="numeric" placeholder="Ej. 170">
                </div>
            </div>
        </div>

        <div class="card-section">
            <div class="section-title">⏱️ Parámetros de Diálisis</div>
            <div class="grid-inputs">
                <div class="input-wrapper">
                    <label for="input-ktv">Meta Kt/V Deseada</label>
                    <input type="number" id="input-ktv" step="0.1" value="1.4" inputmode="decimal">
                </div>
                <div class="input-wrapper">
                    <label for="search-dializador">Modelo Dializador</label>
                    <div class="search-container">
                        <input type="text" id="search-dializador" placeholder="Buscar filtro..." oninput="filtrarDializadores()" onfocus="mostrarDropdown()">
                        <div class="dropdown-list" id="dializador-list"></div>
                    </div>
                </div>
                <div class="input-wrapper full-width">
                    <label for="input-k">Aclaramiento K Manual (ml/min)</label>
                    <input type="number" id="input-k" placeholder="Modificar o introducir manual">
                </div>
            </div>
        </div>

        <button class="btn-calc" onclick="calcularTiempoHD()">Calcular Tiempo</button>

        <div class="result-card" id="result-box">
            <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Tiempo Recomendado</div>
            <div class="result-time" id="txt-tiempo-hrs">00:00 hrs</div>
            <div id="txt-tiempo-min" style="font-size: 0.9rem; color: var(--text-dim);">0 minutos totales</div>
            <div class="result-meta">
                <div>Vol. Corp (V): <strong id="txt-v-val">0.0 L</strong></div>
                <div>Aclaramiento (K): <strong id="txt-k-val">0 ml/min</strong></div>
            </div>
        </div>
    </div>

    <script>
        // Base de datos oficial integrada desde Dializador.docx
        const dializadores = [
            {"name":"F5","k":227},{"name":"F6","k":243},{"name":"F7","k":247},{"name":"F8","k":252},{"name":"F10","k":259},
            {"name":"FX5","k":228},{"name":"FX8","k":254},{"name":"FX10","k":261},{"name":"FX50","k":253},{"name":"FX60","k":266},
            {"name":"FX80","k":279},{"name":"FX100","k":280},{"name":"FX CorAL 60","k":270},{"name":"FX CorAL 80","k":277},
            {"name":"FX CorAL 100","k":339},{"name":"FX CorAL 120","k":345},{"name":"SM120 H","k":255},{"name":"SM140 H","k":260},
            {"name":"SM160 H","k":267},{"name":"SM180 H","k":275},{"name":"SM200 H","k":280},{"name":"SM140 L","k":229},
            {"name":"SM160 L","k":231},{"name":"SM180 L","k":235},{"name":"SM200 L","k":238},{"name":"ELISIO 09H","k":243},
            {"name":"ELISIO 11H","k":253},{"name":"ELISIO 13H","k":263},{"name":"ELISIO 15H","k":270},{"name":"ELISIO 17H","k":275},
            {"name":"ELISIO 19H","k":280},{"name":"ELISIO 21H","k":284},{"name":"ELISIO 25H","k":293},{"name":"ELISIO 11M","k":241}
        ];

        let formulaActiva = 'watson';
        let generoActivo = 'M';

        function setFormula(tipo) {
            formulaActiva = tipo;
            document.getElementById('btn-watson').classList.toggle('active', tipo === 'watson');
            document.getElementById('btn-simp').classList.toggle('active', tipo === 'simplificada');
            document.getElementById('wrapper-talla').style.display = tipo === 'watson' ? 'flex' : 'none';
        }

        function setGender(gen) {
            generoActivo = gen;
            document.getElementById('btn-m').classList.toggle('active', gen === 'M');
            document.getElementById('btn-f').classList.toggle('active', gen === 'F');
        }

        function mostrarDropdown() {
            renderDropdown(dializadores);
            document.getElementById('dializador-list').style.display = 'block';
        }

        function renderDropdown(lista) {
            const container = document.getElementById('dializador-list');
            container.innerHTML = '';
            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerText = `${item.name} (K: ${item.k} ml/min)`;
                div.onclick = () => {
                    document.getElementById('search-dializador').value = item.name;
                    document.getElementById('input-k').value = item.k;
                    container.style.display = 'none';
                };
                container.appendChild(div);
            });
        }

        function filtrarDializadores() {
            const query = document.getElementById('search-dializador').value.toLowerCase();
            const filtrados = dializadores.filter(d => d.name.toLowerCase().includes(query));
            renderDropdown(filtrados);
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-container')) {
                document.getElementById('dializador-list').style.display = 'none';
            }
        });

        function calcularTiempoHD() {
            const peso = parseFloat(document.getElementById('input-peso').value);
            const edad = parseInt(document.getElementById('input-edad').value);
            const talla = parseFloat(document.getElementById('input-talla').value);
            const targetKtV = parseFloat(document.getElementById('input-ktv').value);
            const kFiltracion = parseFloat(document.getElementById('input-k').value);

            if (!peso || !edad || (formulaActiva === 'watson' && !talla) || !targetKtV || !kFiltracion) {
                alert("Por favor, rellene todos los campos requeridos.");
                return;
            }

            let V = 0;
            if (formulaActiva === 'watson') {
                if (generoActivo === 'M') {
                    V = 2.447 - (0.09516 * edad) + (0.1074 * talla) + (0.3362 * peso);
                } else {
                    V = -2.0460 + (0.1069 * talla) + (0.2466 * peso);
                }
            } else {
                // Constantes fijadas estrictamente: 0.60 para hombres y 0.58 para mujeres
                const factor = (generoActivo === 'M') ? 0.60 : 0.58;
                V = peso * factor;
            }

            // Fórmula del tiempo: t = (Kt/V * V) / K. Convertimos K de ml/min a L/min dividiendo por 1000
            const kLitrosMin = kFiltracion / 1000;
            const tiempoMinutosTotales = Math.ceil((targetKtV * V) / kLitrosMin);

            const horas = Math.floor(tiempoMinutosTotales / 60);
            const minutos = tiempoMinutosTotales % 60;

            document.getElementById('txt-v-val').innerText = `${V.toFixed(2)} L`;
            document.getElementById('txt-k-val').innerText = `${kFiltracion} ml/min`;
            document.getElementById('txt-tiempo-hrs').innerText = `${String(horas).padStart(2, '0')}:${String(minutos).padStart(2, '0')} hrs`;
            document.getElementById('txt-tiempo-min').innerText = `${tiempoMinutosTotales} minutos totales`;
            
            document.getElementById('result-box').style.display = 'block';
        }

        // Service Worker Offline Autocontenido
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const CACHE_NAME = 'hd-calc-v2';
                const swCode = `
                    const CACHE_NAME = '${CACHE_NAME}';
                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then(cache => cache.addAll(['./', './index.html', './manifest.json']))
                        );
                    });
                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(keys => Promise.all(keys.map(k => k !== CACHE_NAME ? caches.delete(k) : null)))
                        );
                    });
                    self.addEventListener('fetch', event => {
                        event.respondWith(caches.match(event.request).then(res => res || fetch(event.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
    </script>
</body>
</html>
