name: Compilar APK Automático y Autónomo
on:
  push:
    branches:
      - main

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno de Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar Entorno e Icono
        run: |
          # 1. Crear estructura limpia de Cordova para evitar bloqueos
          npm install -g cordova
          cordova create app_build com.calc.dialisis "Tiempo de HD"
          cd app_build
          
          # 2. Agregar soporte para Android
          cordova platform add android --no-telemetry
          
          # 3. Mover tu index.html al directorio de compilación
          rm -rf www/*
          cp ../index.html www/index.html
          
          # 4. Crear un manifiesto web básico para que no falte la referencia
          cat << 'EOF' > www/manifest.json
          {
            "name": "Calculadora de Dialisis",
            "short_name": "Dialisis",
            "start_url": "index.html",
            "display": "standalone",
            "background_color": "#0e1a2e",
            "theme_color": "#0e1a2e",
            "orientation": "portrait-primary"
          }
          EOF

      - name: Compilar APK de Producción (Sin Interacción)
        run: |
          cd app_build
          # Comando nativo de compilación rápida sin firmas interactivas
          cordova build android --device --release -- --packageType=apk

      - name: Extraer y Guardar la APK Lista para Instalar
        uses: actions/upload-artifact@v4
        with:
          name: TiempoHD-Instalable
          path: app_build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
