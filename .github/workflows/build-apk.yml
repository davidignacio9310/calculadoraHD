name: Compilar APK Totalmente Válida y Firmada
on:
  push:
    branches:
      - main

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Android SDK NATIVO
        uses: android-actions/setup-android@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar Proyecto Cordova e Icono
        run: |
          npm install -g cordova
          cordova create app_build com.calc.dialisis "Tiempo de HD"
          cd app_build
          cordova platform add android --no-telemetry
          
          # Copiar tu index.html al directorio de compilación
          rm -rf www/*
          cp ../index.html www/index.html
          
          # Crear manifiesto básico requerido por el contenedor
          cat << 'EOF' > www/manifest.json
          {
            "name": "Calculadora de Dialisis",
            "short_name": "Dialisis",
            "start_url": "index.html",
            "display": "standalone",
            "background_color": "#0e1a2e",
            "theme_color": "#0e1a2e",
            "orientation": "portrait-primary"
          }
          EOF

      - name: Compilar APK en modo Release
        run: |
          cd app_build
          cordova build android --release -- --packageType=apk

      - name: Optimizar, Alinear y Firmar con Esquema Moderno (apksigner v2/v3)
        run: |
          cd app_build/platforms/android/app/build/outputs/apk/release/
          
          # 1. Generar la clave de seguridad interna
          keytool -genkey -v -keystore mi-llave.keystore -alias dialisis -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Calculadora, OU=Medicina, O=Hospital, L=Faustino, S=SP, C=CU"
          
          # 2. PRIMERO se debe alinear el archivo (Zipalign) ANTES de usar apksigner
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 app-release-unsigned.apk TiempoHD_Alineada.apk
          
          # 3. SEGUNDO se firma usando APKSIGNER (Soporta esquemas modernos de Android que evitan el error de paquete inválido)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks mi-llave.keystore --ks-pass pass:123456 --key-pass pass:123456 --out TiempoHD_Instalable.apk TiempoHD_Alineada.apk
          
          # 4. Verificar que la firma es perfectamente válida para Android
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify TiempoHD_Instalable.apk

      - name: Extraer y Guardar la APK Verificada
        uses: actions/upload-artifact@v4
        with:
          name: TiempoHD-Instalable-Firme
          path: app_build/platforms/android/app/build/outputs/apk/release/TiempoHD_Instalable.apk
