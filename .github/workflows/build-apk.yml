name: Compilar APK Firme y Válida
on:
  push:
    branches:
      - main

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Android SDK NATIVO
        uses: android-actions/setup-android@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar Proyecto Cordova e Icono
        run: |
          npm install -g cordova
          cordova create app_build com.calc.dialisis "Tiempo de HD"
          cd app_build
          cordova platform add android --no-telemetry
          
          # Limpiar y copiar tu index.html
          rm -rf www/*
          cp ../index.html www/index.html
          
          # Crear manifiesto básico interno requerido
          cat << 'EOF' > www/manifest.json
          {
            "name": "Calculadora de Dialisis",
            "short_name": "Dialisis",
            "start_url": "index.html",
            "display": "standalone",
            "background_color": "#0e1a2e",
            "theme_color": "#0e1a2e",
            "orientation": "portrait-primary"
          }
          EOF

      - name: Compilar APK Base
        run: |
          cd app_build
          cordova build android --release -- --packageType=apk

      - name: Generar Clave de Firma y Firmar APK (Evita error de paquete no válido)
        run: |
          cd app_build/platforms/android/app/build/outputs/apk/release/
          
          # 1. Generar una clave de auto-firma digital en el acto
          keytool -genkey -v -keystore mi-llave.keystore -alias dialisis -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Calculadora, OU=Medicina, O=Hospital, L=Faustino, S=SP, C=CU"
          
          # 2. Firmar el archivo APK usando la herramienta oficial de Android (jarsigner)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore mi-llave.keystore -storepass 123456 app-release-unsigned.apk dialisis
          
          # 3. Optimizar y renombrar el archivo para que sea un instalador Android definitivo
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 app-release-unsigned.apk TiempoHD_Instalable.apk

      - name: Extraer y Guardar la APK Verificada
        uses: actions/upload-artifact@v4
        with:
          name: TiempoHD-Instalable-Firme
          path: app_build/platforms/android/app/build/outputs/apk/release/TiempoHD_Instalable.apk
