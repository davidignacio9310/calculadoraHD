name: Build Android APK (Autocontenido)
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar Manifiesto e Icono Físicos en Servidor
        run: |
          # 1. El servidor genera el icono SVG de la app de diálisis
          cat << 'EOF' > icon.svg
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <g fill="#48cae4">
              <path d="M368,64H144c-26.5,0-48,21.5-48,48v288c0,26.5,21.5,48,48,48h224c26.5,0,48-21.5,48-48V112C416,85.5,394.5,64,368,64z M384,400c0,8.8-7.2,16-16,16H144c-8.8,0-16-7.2-16-16V112c0-8.8,7.2-16,16-16h224c8.8,0,16,7.2,16,16V400z"/>
              <path d="M200,144h112c8.8,0,16-7.2,16-16s-7.2-16-16-16H200c-8.8,0-16,7.2-16,16S191.2,144,200,144z"/>
              <path d="M256,200c-44.1,0-80,35.9-80,80s35.9,80,80,80s80-35.9,80-80S300.1,200,256,200z M256,328c-26.5,0-48-21.5-48-48s21.5-48,48-48s48,21.5,48,48S282.5,328,256,328z"/>
              <path d="M242,458c-4.5-4.5-11-5.8-16.8-3.4l-48,20c-7.7,3.2-11.3,12.1-8.1,19.8s12.1,11.3,19.8,8.1l39.5-16.5l24.2,24.2c6.2,6.2,16.3,6.2,22.6,0s6.2-16.3,0-22.6L242,458z"/>
              <path d="M314.8,454.6c-5.8-2.4-12.3-1.1-16.8,3.4l-24.2,24.2c-6.2,6.2-6.2,16.3,0,22.6c3.1,3.1,7.2,4.7,11.3,4.7s8.2-1.6,11.3-4.7l24.2-24.2c4.5-4.5,5.8-11,3.4-16.8l-16.5-39.5C314.3,449.7,305.4,446.1,297.7,449.3s-11.3,12.1-8.1,19.8L314.8,454.6z"/>
            </g>
          </svg>
          EOF

          # 2. El servidor genera el archivo manifest.json vinculando el icono anterior
          cat << 'EOF' > manifest.json
          {
            "name": "Calculadora de Dialisis",
            "short_name": "Dialisis",
            "start_url": "./index.html",
            "display": "standalone",
            "background_color": "#0e1a2e",
            "theme_color": "#0e1a2e",
            "orientation": "portrait-primary",
            "icons": [
              {
                "src": "icon.svg",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
              }
            ]
          }
          EOF

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          bubblewrap init --manifest=manifest.json --signingKeyPath="./signing.key"
          bubblewrap build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ./*.apk
